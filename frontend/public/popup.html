<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matador</title>
    <style>
      :root {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #111827;
      }

      body {
        margin: 0;
        width: 420px;
        max-height: 560px;
        background: #f7f8fa;
      }

      .wrap {
        padding: 12px;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 8px;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: #0f5cc0;
        color: #fff;
        padding: 8px 12px;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background: #0b4ca0;
      }

      .status {
        margin: 8px 0;
        font-size: 12px;
        color: #4b5563;
      }

      .error {
        color: #b42318;
        font-size: 12px;
      }

      .card {
        background: #fff;
        border: 1px solid #d9dde3;
        border-radius: 8px;
        padding: 10px;
      }

      .meta {
        font-size: 12px;
        color: #4b5563;
      }

      .text {
        margin-top: 8px;
        max-height: 320px;
        overflow: auto;
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.4;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        background: #f8fafc;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Matador Extract</h1>
      <button id="extractBtn" type="button">Extract Active Tab</button>
      <p id="status" class="status">Ready</p>
      <p id="error" class="error"></p>
      <section id="result" class="card" hidden>
        <div class="meta" id="meta"></div>
        <div class="text" id="text"></div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
  </html>
